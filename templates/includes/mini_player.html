{% load static %}
<div id="mini-player" class="mini-player hidden">
  <div class="player-left">
    <img id="player-pochette" src="{% static 'img/default-cover.jpg' %}" alt="pochette" />
    <div class="player-info">
      <span id="player-titre">—</span>
      <span id="player-artiste">—</span>
    </div>
  </div>

  <div class="player-controls">
    <button id="btn-prev" title="Précédent" onclick="playerPrev()">⏮</button>
    <button id="btn-play-pause" title="Play/Pause">▶</button>
    <button id="btn-next" title="Suivant" onclick="playerNext()">⏭</button>
  </div>

  <div class="player-progress">
    <span id="player-current-time">0:00</span>
    <input type="range" id="player-progress" value="0" min="0" max="100" />
    <span id="player-total-time">0:00</span>
  </div>

  <div class="player-volume">
    <span>🔊</span>
    <input type="range" id="player-volume" value="70" min="0" max="100" />
  </div>
</div>
