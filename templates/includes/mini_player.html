{% load static %}
<div id="mini-player" class="mini-player hidden">
  <div class="player-left">
    <img id="player-pochette" src="" alt="pochette" />
    <div class="player-info">
      <span id="player-titre">—</span>
      <span id="player-artiste">—</span>
    </div>
  </div>

  <div class="player-controls">
    <button onclick="playerPrev()" title="Précédent">⏮</button>
    <button id="player-btn" onclick="playerToggle()" title="Play/Pause">
      ▶
    </button>
    <button onclick="playerNext()" title="Suivant">⏭</button>
  </div>

  <div class="player-progress">
    <span id="player-current">0:00</span>
    <input
      type="range"
      id="player-bar"
      value="0"
      min="0"
      max="100"
      oninput="playerSeek(this.value)"
    />
    <span id="player-duration">0:00</span>
  </div>

  <div class="player-volume">
    🔊
    <input
      type="range"
      id="player-vol"
      value="80"
      min="0"
      max="100"
      oninput="playerVolume(this.value)"
    />
  </div>

  <audio id="audio-global"></audio>
</div>
